<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <title>Argent Gryphon</title>
    <link rel="icon" type="image/png" sizes="32x32" href="img/main/AG2_Shield_32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/main/AG2_Shield_16x16.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-fixed"></div>
<div class="container">
    <img src="img/main/AGlogo.png" alt="Argent Gryphon crest" class="logo">
    <nav class="navbar" id="navbar"></nav>
    <main class="content-box">

        <section data-page="home"      class="page active"><div id="home-content"></div></section>
        <section data-page="codex"     class="page"><div id="codex-content"></div></section>
        <section data-page="enlist"    class="page"><div id="enlist-content"></div></section>
        <section data-page="journal"   class="page">
            <h2>Valkera's Journal</h2>
            <p class="journal-intro">Personal chronicles of Lady Warden Valkera — kept in her own hand, sealed within the fortress archive.</p>
            <div class="journal-nav">
                <button class="journal-arrow" id="journal-prev" onclick="journalStep(-1)" aria-label="Previous entry">&#8249;</button>
                <div class="journal-index-wrap">
                    <span class="journal-label">Entry</span>
                    <div id="journal-tabs" class="journal-tabs"></div>
                </div>
                <button class="journal-arrow" id="journal-next" onclick="journalStep(1)" aria-label="Next entry">&#8250;</button>
            </div>
            <div id="journal-entry-title" class="journal-entry-title"></div>
            <div id="journal-entry-body"  class="journal-entry-body"></div>
        </section>
        <section data-page="diplomacy" class="page"><div id="diplomacy-content"></div></section>
        <section data-page="decree"    class="page"><div id="decree-content"></div></section>
        <section data-page="ranks"     class="page"><div id="ranks-content"></div></section>
        <section data-page="members"   class="page">
            <h2>Members</h2>
            <p id="members-error" style="display:none;color:#ff8888;">Could not load member data. Make sure <em>sources/characters.json</em> is in place.</p>
            <div id="members-list"></div>
        </section>
        <section data-page="character" class="page">
            <a class="char-back" href="#members" onclick="showPage('members');return false;">Return to the Order</a>
            <div id="char-sheet-content"></div>
        </section>

    </main>
</div>

<script>
const PAGES = ['home','codex','enlist','journal','diplomacy','decree','ranks','members'];
const nameToSlug = n => n.toLowerCase().replace(/[^a-z0-9]/g,'');
const setHTML    = (id, html) => document.getElementById(id).innerHTML = html;
const json       = (url, cb, err) => fetch(url).then(r=>{ if(!r.ok) throw 0; return r.json(); }).then(cb).catch(err||(() => {}));

/* --- Navbar --- */
setHTML('navbar', PAGES.map(p =>
    `<button class="nav-button" onclick="showPage('${p}')">${p[0].toUpperCase()+p.slice(1)}</button>`
).join(''));

/* --- Generic title+body loader (home, enlist, diplomacy, decree) --- */
function loadSimple(page, file) {
    const el = document.getElementById(page+'-content');
    if (el.dataset.loaded) return;
    el.dataset.loaded = '1';
    json('sources/'+file, d => {
        el.innerHTML = (d.title ? `<h2>${d.title}</h2>` : '') + (d.body ? d.body : '');
    }, () => {
        el.innerHTML = `<p style="color:#ff8888;">Could not load <em>sources/${file}</em>.</p>`;
    });
}

/* --- Codex --- */
function loadCodex() {
    const el = document.getElementById('codex-content');
    if (el.dataset.loaded) return;
    el.dataset.loaded = '1';
    json('sources/codex.json', d => {
        el.innerHTML = (d.title ? `<h2>${d.title}</h2>` : '')
            + (d.intro ? `<p>${d.intro}</p>` : '')
            + '<div class="section">'
            + (d.items||[]).map(it =>
                `<div class="codex-item"><img src="img/main/FWD_Fist.png" class="codex-icon" alt=""><div><strong>${it.title}</strong> ${it.text}</div></div>`
            ).join('') + '</div>';
    }, () => { el.innerHTML = '<p style="color:#ff8888;">Could not load <em>sources/codex.json</em>.</p>'; });
}

/* --- Ranks --- */
let RANK_MAP = new Map();
function loadRanks() {
    const el = document.getElementById('ranks-content');
    if (el.dataset.loaded) return;
    el.dataset.loaded = '1';
    json('sources/ranks.json', d => {
        RANK_MAP = new Map((d.ranks||[]).map(r => [r.name, r.key]));
        el.innerHTML = (d.title ? `<h2>${d.title}</h2>` : '')
            + (d.ranks||[]).filter(r => r.desc).map(r =>
                `<div class="rank-item"><img src="img/ranks/ranks_${r.key}_rankbadge.png" class="rank-icon" alt="${r.name} badge"><div class="rank-text"><strong>${r.name}</strong><span>${r.desc}</span></div></div>`
            ).join('');
    }, () => { el.innerHTML = '<p style="color:#ff8888;">Could not load <em>sources/ranks.json</em>.</p>'; });
}

const badgeSrc = rank => `img/ranks/ranks_${RANK_MAP.get(rank)||'initiate'}_rankbadge.png`;

/* --- Members --- */
let characterData = [];
function loadMembers() {
    const list = document.getElementById('members-list');
    if (list.dataset.loaded) return;
    list.dataset.loaded = '1';
    json('sources/characters.json', chars => {
        characterData = chars;
        setHTML('members-list', chars.map((c,i) => {
            if (!c.rank) return '';
            const icon = c.sheet
                ? `<a class="sheet-icon-link" href="#${nameToSlug(c.name)}" onclick="showCharacterSheet(${i});return false;" title="View character sheet"><img class="sheet-icon" src="img/icons/journal_history_binder.png" alt="Character sheet"></a>`
                : '';
            return `<div class="member-card">
                <img class="member-badge" src="${badgeSrc(c.rank)}" alt="${c.rank} badge">
                <div class="member-info">
                    <div class="member-name">${c.name}${icon}</div>
                    <div class="member-rank-label">${c.rank}</div>
                </div>
                ${c.points>0 ? `<div class="member-points"><span class="member-points-number">${c.points}</span><img class="member-points-icon" src="img/icons/heroicscroll.png" alt="points"></div>` : ''}
            </div>`;
        }).join(''));
    }, () => { document.getElementById('members-error').style.display = 'block'; });
}

/* --- Character Sheet --- */
function showCharacterSheet(index) {
    const c = characterData[index];
    if (!c?.sheet) return;
    const bio = c.sheet.bio || '';
    setHTML('char-sheet-content', `
        <div class="char-header">
            <div class="char-name">${c.name}</div>
            <div class="char-meta">
                <img class="char-badge" src="${badgeSrc(c.rank)}" alt="${c.rank} badge">
                <span class="char-rank">${c.rank}</span>
                <span class="char-separator">·</span>
                <span class="char-order">Order of the Argent Gryphon</span>
            </div>
        </div>
        ${c.sheet.portrait ? `<div class="char-portrait-wrap"><img class="char-portrait" src="${c.sheet.portrait}" alt="Portrait of ${c.name}"></div><div class="char-rule"></div>` : ''}
        <div class="char-body">${typeof bio==='string' ? bio : bio.map(p=>`<p>${p}</p>`).join('')}</div>
    `);
    showPage('character', false);
    try { history.pushState({page:'character',slug:nameToSlug(c.name)},'','/#'+nameToSlug(c.name)); } catch(e){}
}

function tryOpenCharacterBySlug(slug) {
    const open = chars => {
        const idx = chars.findIndex(c => c.sheet && nameToSlug(c.name) === slug);
        if (idx !== -1) showCharacterSheet(idx);
    };
    if (characterData.length) { open(characterData); return; }
    json('sources/characters.json', chars => { characterData = chars; open(chars); });
}

/* --- Journal --- */
let jEntries = [], jIdx = 0, jReady = false;

function initJournal() {
    if (jReady) return;
    jReady = true;
    json('sources/journal.json', entries => {
        jEntries = entries;
        setHTML('journal-tabs', entries.map((e,i) =>
            `<button class="journal-tab${i===0?' active':''}" aria-label="${e.title}" onclick="showJournalEntry(${i})">${i+1}</button>`
        ).join(''));
        showJournalEntry(0);
    }, () => { document.getElementById('journal-entry-body').textContent = 'Could not load journal entries.'; });
}

function showJournalEntry(i) {
    jIdx = i;
    const e = jEntries[i];
    document.getElementById('journal-entry-title').textContent = e.title;
    setHTML('journal-entry-body', e.body.split(/\n\n+/).map(p=>`<p>${p.trim().replace(/\n/g,'<br>')}</p>`).join(''));
    document.querySelectorAll('.journal-tab').forEach((b,j) => b.classList.toggle('active', j===i));
    document.getElementById('journal-prev').disabled = i===0;
    document.getElementById('journal-next').disabled = i===jEntries.length-1;
}

function journalStep(dir) {
    const n = jIdx + dir;
    if (n >= 0 && n < jEntries.length) showJournalEntry(n);
}

/* --- Page switching --- */
function showPage(pageId, pushHistory=true) {
    document.querySelector('.page.active')?.classList.remove('active');
    document.querySelector(`[data-page="${pageId}"]`).classList.add('active');
    if (pageId==='home')      loadSimple('home','homepage.json');
    if (pageId==='enlist')    loadSimple('enlist','enlist.json');
    if (pageId==='diplomacy') loadSimple('diplomacy','diplomacy.json');
    if (pageId==='decree')    loadSimple('decree','decree.json');
    if (pageId==='codex')     loadCodex();
    if (pageId==='ranks')     loadRanks();
    if (pageId==='members')   loadMembers();
    if (pageId==='journal')   initJournal();
    if (pushHistory) try { history.pushState({page:pageId},'','/#'+pageId); } catch(e){}
}

/* --- Dark magic easter egg --- */
const bgEl = document.querySelector('.bg-fixed');
let dmTimer;
document.addEventListener('mouseover', e => {
    if (!e.target.classList.contains('member-points-icon')) return;
    clearTimeout(dmTimer);
    bgEl.classList.add('dark-magic','dark-magic-anim');
    document.body.classList.add('dark-magic-active');
});
document.addEventListener('mouseout', e => {
    if (!e.target.classList.contains('member-points-icon')) return;
    bgEl.classList.remove('dark-magic-anim');
    document.body.classList.remove('dark-magic-active');
    dmTimer = setTimeout(() => bgEl.classList.remove('dark-magic'), 30000);
});

/* --- Back/forward & hash routing --- */
window.addEventListener('popstate', () => {
    const h = location.hash.slice(1);
    if (PAGES.includes(h)) showPage(h, false);
    else if (h)            tryOpenCharacterBySlug(h);
    else                   showPage('home', false);
    window.scrollTo(0,0);
});

const hash = location.hash.slice(1);
if (PAGES.includes(hash))      { history.replaceState({page:hash},'','/#'+hash); showPage(hash,false); }
else if (hash)                  { tryOpenCharacterBySlug(hash); }
else                            { history.replaceState({page:'home'},'','/#home'); showPage('home',false); }
window.scrollTo(0,0);

/* --- Map magnifier --- */
const ZOOM=3, LENS_SIZE=220, HALF=LENS_SIZE/2;
const lens = Object.assign(document.createElement('div'), {className:'map-magnifier'});
document.body.appendChild(lens);

function renderMagnifier(clientX, clientY, img, isTouch) {
    const r  = img.getBoundingClientRect();
    const cx = Math.max(0, Math.min(clientX-r.left, r.width));
    const cy = Math.max(0, Math.min(clientY-r.top,  r.height));
    lens.style.backgroundImage    = `url('${img.src}')`;
    lens.style.backgroundSize     = `${r.width*ZOOM}px ${r.height*ZOOM}px`;
    lens.style.backgroundPosition = `${HALF-cx*ZOOM}px ${HALF-cy*ZOOM}px`;
    lens.style.display = 'block';
    lens.style.left    = (clientX-HALF)+'px';
    lens.style.top     = (isTouch ? clientY-LENS_SIZE-260 : clientY-HALF)+'px';
}

function initMagnifier(img) {
    img.addEventListener('mouseenter', () => lens.style.display='block');
    img.addEventListener('mouseleave', () => lens.style.display='none');
    img.addEventListener('mousemove',  e => renderMagnifier(e.clientX, e.clientY, img, false));
    img.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; renderMagnifier(t.clientX,t.clientY,img,true); }, {passive:false});
    img.addEventListener('touchmove',  e => { e.preventDefault(); const t=e.touches[0]; renderMagnifier(t.clientX,t.clientY,img,true); }, {passive:false});
    img.addEventListener('touchend',    () => lens.style.display='none');
    img.addEventListener('touchcancel', () => lens.style.display='none');
}

new MutationObserver(ms => ms.forEach(m => m.addedNodes.forEach(n => {
    if (n.nodeType!==1) return;
    (n.matches?.('.home-img') ? [n] : [...n.querySelectorAll('.home-img')]).forEach(initMagnifier);
}))).observe(document.getElementById('home-content'), {childList:true, subtree:true});

</script>
</body>
</html>
