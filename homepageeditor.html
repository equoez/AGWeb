<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argent Gryphon — Homepage Editor</title>
    <link rel="icon" type="image/png" sizes="32x32" href="img/main/AG2_Shield_32x32.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --color-input-bg:     rgba(255,255,255,0.05);
            --color-input-border: rgba(255, 210, 122, 0.2);
            --color-input-focus:  rgba(255, 210, 122, 0.45);
            --color-danger:       #ff6b6b;
            --color-success:      #6bff9e;
        }

        body { padding-bottom: 80px; }

        .editor-wrap { width: 720px; max-width: 96vw; }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255,210,122,0.15);
        }
        .editor-header h2 { margin: 0; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: var(--radius-btn);
            border: 1px solid rgba(255,210,122,0.3);
            background: rgba(255,210,122,0.08);
            color: var(--color-gold);
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .btn:hover { background: rgba(255,210,122,0.15); border-color: rgba(255,210,122,0.5); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: rgba(255,210,122,0.18); border-color: var(--color-gold-dim); }
        .btn-primary:hover { background: rgba(255,210,122,0.28); }
        .btn-sm { padding: 6px 13px; font-size: 12px; }

        .instructions {
            background: rgba(255,210,122,0.04);
            border: 1px solid rgba(255,210,122,0.12);
            border-left: 3px solid var(--color-gold-dim);
            border-radius: 0 8px 8px 0;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
            line-height: 1.6;
        }
        .instructions strong { color: var(--color-gold-light); }

        .load-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .load-bar p { margin: 0; font-size: 0.88rem; color: var(--color-text-muted); }

        /* Title field */
        .field-label {
            font-family: var(--font-display);
            font-size: 11px;
            letter-spacing: 0.06em;
            color: var(--color-gold-dim);
            display: block;
            margin-bottom: 6px;
        }
        #page-title {
            width: 100%;
            background: var(--color-input-bg);
            border: 1px solid var(--color-input-border);
            border-radius: 6px;
            color: var(--color-text);
            font-family: var(--font-display);
            font-size: 1rem;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        #page-title:focus { border-color: var(--color-input-focus); }

        /* RTE */
        .rte-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 8px;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--color-input-border);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }
        .rte-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 26px;
            padding: 0 7px;
            border: 1px solid rgba(255,210,122,0.2);
            border-radius: 4px;
            background: rgba(255,210,122,0.05);
            color: var(--color-text-muted);
            font-family: var(--font-body);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1;
        }
        .rte-btn:hover { background: rgba(255,210,122,0.14); color: var(--color-gold-light); border-color: rgba(255,210,122,0.4); }
        .rte-btn.active { background: rgba(255,210,122,0.2); color: var(--color-gold); border-color: var(--color-gold-dim); }
        .rte-btn-sep { width: 1px; background: rgba(255,210,122,0.15); margin: 2px; align-self: stretch; }

        .rte-editor {
            background: var(--color-input-bg);
            border: 1px solid var(--color-input-border);
            border-radius: 0 0 6px 6px;
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            padding: 16px 18px;
            outline: none;
            min-height: 340px;
            line-height: 1.75;
            transition: border-color 0.2s;
        }
        .rte-editor:focus { border-color: var(--color-input-focus); }
        .rte-editor p { margin: 0 0 10px; }
        .rte-editor h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-gold-light);
            letter-spacing: 0.04em;
            margin: 14px 0 4px;
        }
        .rte-editor strong { color: var(--color-gold-light); }
        .rte-editor em { color: var(--color-text-muted); font-style: italic; }

        /* Output */
        .output-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,210,122,0.15);
        }
        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .output-header h3 { margin: 0; }
        #output-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,210,122,0.15);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--color-text-muted);
            white-space: pre;
            overflow-x: auto;
            max-height: 360px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .copy-feedback {
            font-size: 12px;
            color: var(--color-success);
            opacity: 0;
            transition: opacity 0.3s;
            font-family: var(--font-body);
        }
        .copy-feedback.show { opacity: 1; }
    </style>
</head>
<body>

<div class="bg-fixed"></div>

<div class="container">
    <img src="img/main/AGlogo.png" alt="Argent Gryphon crest" class="logo">

    <div class="editor-wrap">
        <div class="content-box">

            <div class="editor-header">
                <h2>Homepage Editor</h2>
                <a class="btn btn-sm" href="index.html">&#8592; Back to site</a>
            </div>

            <div class="instructions">
                <strong>How to use:</strong> Edit the title and body below, then click <strong>Generate JSON</strong>.
                Copy the result and paste it into <code>sources/homepage.json</code> — then save/commit.
            </div>

            <div class="load-bar">
                <button class="btn btn-sm" onclick="fetchLive()">&#8635; Reload from site</button>
                <label class="btn btn-sm" style="cursor:pointer;">
                    &#8599; Load from file
                    <input type="file" id="file-input" accept=".json" style="display:none">
                </label>
                <p id="load-status">Loading…</p>
            </div>

            <!-- Title -->
            <label class="field-label" for="page-title">Page Title</label>
            <input type="text" id="page-title" placeholder="e.g. Order of the Argent Gryphon">

            <!-- Rich text body -->
            <label class="field-label">Body</label>
            <div class="rte-toolbar" id="rte-toolbar">
                <button class="rte-btn" title="Heading" onmousedown="event.preventDefault();rteCmd('heading')">
                    <b style="font-family:var(--font-display);font-size:11px;">H</b>
                </button>
                <div class="rte-btn-sep"></div>
                <button class="rte-btn" title="Bold"      onmousedown="event.preventDefault();rteCmd('bold')"><b>B</b></button>
                <button class="rte-btn" title="Italic"    onmousedown="event.preventDefault();rteCmd('italic')"><i>I</i></button>
                <button class="rte-btn" title="Underline" onmousedown="event.preventDefault();rteCmd('underline')"><u>U</u></button>
                <div class="rte-btn-sep"></div>
                <button class="rte-btn" title="Clear formatting" onmousedown="event.preventDefault();rteCmd('removeFormat')" style="font-size:11px;">✕ fmt</button>
            </div>
            <div class="rte-editor" id="rte-body" contenteditable="true"
                onkeyup="updateToolbarState()"
                onmouseup="updateToolbarState()"></div>

            <!-- Output -->
            <div class="output-section">
                <div class="output-header">
                    <h3>Generated JSON</h3>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span class="copy-feedback" id="copy-feedback">Copied!</span>
                        <button class="btn btn-sm" onclick="copyOutput()">&#9647; Copy</button>
                        <button class="btn btn-primary btn-sm" onclick="generateOutput()">&#8635; Generate JSON</button>
                    </div>
                </div>
                <div id="output-box">Click "Generate JSON" to preview the output.</div>
            </div>

        </div>
    </div>
</div>

<script>

    const editor  = document.getElementById('rte-body');
    const titleEl = document.getElementById('page-title');

    /* ── RTE commands ── */
    function rteCmd(cmd) {
        editor.focus();
        if (cmd === 'heading') {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const node = sel.getRangeAt(0).commonAncestorContainer;
            const block = node.nodeType === 3 ? node.parentElement : node;
            document.execCommand('formatBlock', false, block.closest('h3') ? 'p' : 'h3');
        } else {
            document.execCommand(cmd, false, null);
        }
        updateToolbarState();
    }

    function updateToolbarState() {
        const toolbar = document.getElementById('rte-toolbar');
        const btns = toolbar.querySelectorAll('.rte-btn');
        const sel = window.getSelection();
        let inH3 = false;
        if (sel && sel.rangeCount) {
            const node = sel.getRangeAt(0).commonAncestorContainer;
            const el = node.nodeType === 3 ? node.parentElement : node;
            inH3 = !!el.closest('h3');
        }
        btns[0].classList.toggle('active', inH3);
        btns[2].classList.toggle('active', document.queryCommandState('bold'));
        btns[3].classList.toggle('active', document.queryCommandState('italic'));
        btns[4].classList.toggle('active', document.queryCommandState('underline'));
    }

    /* ── Generate JSON ── */
    function generateOutput() {
        const out = {
            title: titleEl.value.trim(),
            body:  editor.innerHTML.trim()
        };
        document.getElementById('output-box').textContent = JSON.stringify(out, null, 2);
    }

    /* ── Copy ── */
    function copyOutput() {
        const text = document.getElementById('output-box').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const fb = document.getElementById('copy-feedback');
            fb.classList.add('show');
            setTimeout(() => fb.classList.remove('show'), 2000);
        });
    }

    /* ── File loading ── */
    document.getElementById('file-input').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                loadData(JSON.parse(e.target.result));
            } catch {
                alert('Could not parse the file. Make sure it is valid JSON.');
            }
        };
        reader.readAsText(file);
        this.value = '';
    });

    /* ── Populate fields from data ── */
    function loadData(data) {
        titleEl.value   = data.title || '';
        editor.innerHTML = data.body  || '';
        generateOutput();
    }

    /* ── Live fetch ── */
    function fetchLive() {
        const status = document.getElementById('load-status');
        status.textContent = 'Loading…';
        status.style.color = '';
        fetch('sources/homepage.json?nocache=' + Date.now())
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(data => {
                loadData(data);
                status.textContent = 'Loaded from site ✓';
                status.style.color = 'var(--color-success)';
            })
            .catch(() => {
                status.textContent = 'Could not load — use "Load from file" instead.';
                status.style.color = 'var(--color-danger)';
            });
    }

    fetchLive();

</script>
</body>
</html>
